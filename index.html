<!doctype html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatbot Scientifique Orange</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; height: 100vh; display: flex; flex-direction: column; }
        
        /* Design Orange & Noir */
        .header { padding: 15px; background: linear-gradient(to right, #ff4500, #ffcc00); color: #000; text-align: center; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; }
        
        #chatBox { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; scroll-behavior: smooth; }

        /* Animation POP-IN REBOND */
        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.5) rotate(-5deg); }
            70% { transform: scale(1.1) rotate(2deg); }
            100% { opacity: 1; transform: scale(1) rotate(0); }
        }

        .msg { max-width: 80%; padding: 14px; border-radius: 15px; animation: popIn 0.5s cubic-bezier(0.26, 1.36, 0.4, 1.2) forwards; position: relative; }
        
        .bot { align-self: flex-start; background: linear-gradient(135deg, #ff8c00, #ffe0b2); color: #000; border-left: 5px solid #fff; }
        .user { align-self: flex-end; background: #1a1a1a; color: #ff8c00; border: 1px solid #ff8c00; }

        .input-container { padding: 20px; background: #080808; display: flex; border-top: 2px solid #ff8c00; }
        input { flex: 1; background: #111; border: 1px solid #333; color: white; padding: 15px; border-radius: 30px; outline: none; transition: 0.3s; }
        input:focus { border-color: #ff8c00; box-shadow: 0 0 10px rgba(255, 140, 0, 0.5); }
        button { background: #ff8c00; border: none; padding: 0 25px; margin-left: 10px; border-radius: 30px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { transform: scale(1.05); background: #ff4500; }
    </style>
</head>
<body>

<div class="header">Assistant Science Pro</div>
<div id="chatBox">
    <div class="msg bot">Posez-moi n'importe quelle question sur la physique, la chimie ou les maths !</div>
</div>

<div class="input-container">
    <input type="text" id="userInput" placeholder="Ex: C'est quoi la loi d'Ohm ?" onkeypress="if(event.key==='Enter') send()">
    <button onclick="send()">DEMANDER</button>
</div>

<script>
    // LOGIQUE DE RECONNAISSANCE SCIENTIFIQUE
    // On définit des "Thèmes" qui couvrent des milliers de questions possibles
    const scienceDB = {
        physique: {
            keywords: ["ohm", "electricite", "tension", "courant", "newton", "gravite", "vitesse", "energie", "atome", "relativite", "einstein", "force"],
            response: "En physique, ce concept est lié aux lois fondamentales de la matière et de l'énergie. (Ex: F=ma pour Newton ou U=RI pour Ohm)."
        },
        chimie: {
            keywords: ["mole", "tableau periodique", "element", "molecule", "reaction", "acide", "base", "ph", "liaison", "gaz", "liquide", "solide"],
            response: "En chimie, cela concerne la structure de la matière et ses transformations moléculaires."
        },
        maths: {
            keywords: ["pythagore", "thales", "equation", "derivee", "integrale", "geometrie", "nombre", "pi", "cercle", "triangle", "cosinus", "sinus"],
            response: "C'est une question de mathématiques ! On utilise ici le raisonnement logique et le calcul pour résoudre le problème."
        }
    };

    function send() {
        let input = document.getElementById("userInput");
        let chat = document.getElementById("chatBox");
        if (!input.value.trim()) return;

        // Message User
        chat.innerHTML += `<div class="msg user">${input.value}</div>`;
        let text = input.value.toLowerCase();
        input.value = "";

        // Réflexion du bot
        setTimeout(() => {
            let reply = "Désolé, je ne connais pas encore ce concept précis. Mais je peux répondre sur la physique, la chimie et les maths !";
            
            // Logique de scan
            for (let theme in scienceDB) {
                if (scienceDB[theme].keywords.some(k => text.includes(k))) {
                    reply = `[${theme.toUpperCase()}] : ${scienceDB[theme].response}`;
                    break;
                }
            }

            chat.innerHTML += `<div class="msg bot">${reply}</div>`;
            chat.scrollTop = chat.scrollHeight;
        }, 700);
    }
</script>
</body>
</html>
