<!doctype html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatbot Science Expert</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* Header Orange */
        .header { padding: 15px; background: linear-gradient(90deg, #ff4500, #ff8c00); color: #000; text-align: center; font-weight: 800; letter-spacing: 1px; box-shadow: 0 4px 20px rgba(255, 69, 0, 0.4); z-index: 10; }
        
        #chatBox { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; background: radial-gradient(circle at center, #111 0%, #000 100%); }

        /* Animation Pop-in Rebond */
        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.8) translateY(20px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        .msg { max-width: 85%; padding: 15px; border-radius: 20px; animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; line-height: 1.5; font-size: 0.95rem; }
        
        .bot { align-self: flex-start; background: linear-gradient(135deg, #ff8c00, #ffcc80); color: #000; border-bottom-left-radius: 2px; box-shadow: 0 5px 15px rgba(255, 140, 0, 0.2); }
        .user { align-self: flex-end; background: #222; color: #ff8c00; border: 1px solid #ff8c00; border-bottom-right-radius: 2px; }

        /* Zone de saisie */
        .input-container { padding: 20px; background: #0a0a0a; display: flex; gap: 10px; border-top: 1px solid #333; }
        input { flex: 1; background: #1a1a1a; border: 1px solid #444; color: white; padding: 12px 20px; border-radius: 30px; outline: none; transition: 0.3s; }
        input:focus { border-color: #ff8c00; }
        button { background: #ff8c00; border: none; padding: 0 25px; border-radius: 30px; font-weight: bold; cursor: pointer; color: #000; transition: 0.2s; }
        button:hover { background: #ff4500; transform: scale(1.05); }

        /* Indicateur de chargement */
        .loading { font-style: italic; font-size: 0.8rem; color: #ff8c00; margin-bottom: 5px; display: none; }
    </style>
</head>
<body>

<div class="header">SCIENCE EXPLORER IA</div>
<div id="chatBox">
    <div class="msg bot">Je suis connecté à Wikipédia. Posez-moi une question sur les maths, la physique ou la chimie (ex: "C'est quoi un atome ?")</div>
</div>

<div id="loading" class="loading" style="padding-left: 20px;">L'IA recherche dans la base de données...</div>

<div class="input-container">
    <input type="text" id="userInput" placeholder="Votre question scientifique..." onkeypress="if(event.key==='Enter') askWiki()">
    <button onclick="askWiki()">EXPLORER</button>
</div>

<script>
    async function askWiki() {
        const input = document.getElementById("userInput");
        const chat = document.getElementById("chatBox");
        const loader = document.getElementById("loading");
        const query = input.value.trim();

        if (!query) return;

        // Afficher message utilisateur
        chat.innerHTML += `<div class="msg user">${query}</div>`;
        input.value = "";
        chat.scrollTop = chat.scrollHeight;

        // Afficher loader
        loader.style.display = "block";

        try {
            // Appel à l'API Wikipédia (Recherche du résumé de l'article le plus proche)
            const url = `https://fr.wikipedia.org{encodeURIComponent(query)}`;
            const response = await fetch(url);
            const data = await response.json();

            loader.style.display = "none";

            let reply = "";
            if (data.extract) {
                reply = `<b>${data.title}</b> : ${data.extract}`;
            } else {
                reply = "Désolé, je n'ai pas trouvé d'article précis. Essayez d'être plus spécifique (ex: 'Relativité générale' au lieu de 'Einstein').";
            }

            // Afficher réponse du bot
            chat.innerHTML += `<div class="msg bot">${reply}</div>`;
        } catch (error) {
            loader.style.display = "none";
            chat.innerHTML += `<div class="msg bot">Erreur de connexion au savoir mondial. Vérifiez votre internet.</div>`;
        }
        
        chat.scrollTop = chat.scrollHeight;
    }
</script>

</body>
</html>
